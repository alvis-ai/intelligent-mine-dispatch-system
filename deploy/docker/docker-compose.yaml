services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mine_dispatch
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  user-service:
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile.service.local
      args:
        SERVICE: user-service
    command: ["-f", "/app/etc/user-docker.yaml"]
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  auth-service:
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile.service.local
      args:
        SERVICE: auth-service
    command: ["-f", "/app/etc/auth-docker.yaml"]
    ports:
      - "8082:8082"
    depends_on:
      user-service:
        condition: service_started

  vehicle-service:
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile.service.local
      args:
        SERVICE: vehicle-service
    command: ["-f", "/app/etc/vehicle-docker.yaml"]
    ports:
      - "8083:8083"
    depends_on:
      postgres:
        condition: service_healthy

  telemetry-service:
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile.service.local
      args:
        SERVICE: telemetry-service
    command: ["-f", "/app/etc/telemetry-docker.yaml"]
    ports:
      - "8084:8084"
    depends_on:
      redis:
        condition: service_healthy

  dispatch-service:
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile.service.local
      args:
        SERVICE: dispatch-service
    command: ["-f", "/app/etc/dispatch-docker.yaml"]
    ports:
      - "8085:8085"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  alarm-service:
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile.service.local
      args:
        SERVICE: alarm-service
    command: ["-f", "/app/etc/alarm-docker.yaml"]
    ports:
      - "8087:8087"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  route-service:
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile.service.local
      args:
        SERVICE: route-service
    command: ["-f", "/app/etc/route-docker.yaml"]
    ports:
      - "8088:8088"
    depends_on:
      postgres:
        condition: service_healthy

  ai-service:
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile.service.local
      args:
        SERVICE: ai-service
    command: ["-f", "/app/etc/ai-docker.yaml"]
    ports:
      - "8086:8086"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  device-service:
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile.service.local
      args:
        SERVICE: device-service
    command: ["-f", "/app/etc/device-docker.yaml"]
    ports:
      - "8089:8089"
    depends_on:
      postgres:
        condition: service_healthy

  report-service:
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile.service.local
      args:
        SERVICE: report-service
    command: ["-f", "/app/etc/report-docker.yaml"]
    ports:
      - "8090:8090"
    depends_on:
      postgres:
        condition: service_healthy

  gateway:
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile.service.local
      args:
        SERVICE: gateway
    command: ["-f", "/app/etc/gateway-docker.yaml"]
    ports:
      - "8080:8080"
    depends_on:
      - user-service
      - vehicle-service
      - telemetry-service
      - dispatch-service
      - alarm-service
      - route-service
      - ai-service
      - device-service
      - report-service

  web-admin:
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile.frontend
    ports:
      - "5174:80"
    depends_on:
      - gateway

  prometheus:
    image: prom/prometheus:v2.53.0
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'

  grafana:
    image: grafana/grafana:11.1.0
    volumes:
      - ./grafana/datasources:/etc/grafana/provisioning/datasources
      - grafana-data:/var/lib/grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus

  jaeger:
    image: jaegertracing/all-in-one:1.60
    ports:
      - "16686:16686"
      - "4318:4318"

volumes:
  pgdata:
  prometheus-data:
  grafana-data:
