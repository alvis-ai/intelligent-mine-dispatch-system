services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mine_dispatch
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  user-service:
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile.service
      args:
        SERVICE: user-service
    command: ["-f", "/app/etc/user-docker.yaml"]
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  auth-service:
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile.service
      args:
        SERVICE: auth-service
    command: ["-f", "/app/etc/auth-docker.yaml"]
    ports:
      - "8082:8082"
    depends_on:
      user-service:
        condition: service_started

  vehicle-service:
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile.service
      args:
        SERVICE: vehicle-service
    command: ["-f", "/app/etc/vehicle-docker.yaml"]
    ports:
      - "8083:8083"
    depends_on:
      postgres:
        condition: service_healthy

  telemetry-service:
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile.service
      args:
        SERVICE: telemetry-service
    command: ["-f", "/app/etc/telemetry-docker.yaml"]
    ports:
      - "8084:8084"
    depends_on:
      redis:
        condition: service_healthy

  dispatch-service:
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile.service
      args:
        SERVICE: dispatch-service
    command: ["-f", "/app/etc/dispatch-docker.yaml"]
    ports:
      - "8085:8085"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  gateway:
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile.service
      args:
        SERVICE: gateway
    command: ["-f", "/app/etc/gateway-docker.yaml"]
    ports:
      - "8080:8080"
    depends_on:
      - user-service
      - vehicle-service
      - telemetry-service
      - dispatch-service

  web-admin:
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile.frontend
    ports:
      - "5174:80"
    depends_on:
      - gateway

volumes:
  pgdata:
