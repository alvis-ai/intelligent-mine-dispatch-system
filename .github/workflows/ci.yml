name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  GO_VERSION: "1.25"
  NODE_VERSION: "20"

jobs:
  test-backend:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module:
          - ./services/alarm-service
          - ./services/auth-service
          - ./services/dispatch-service
          - ./services/route-service
          - ./services/telemetry-service
          - ./services/user-service
          - ./services/vehicle-service
          - ./gateway
          - ./pkg
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: |
            gateway/go.sum
            pkg/go.sum
            proto/go.sum
            services/*/go.sum

      - name: Go mod download
        run: |
          for dir in gateway pkg proto services/*/; do
            (cd "$dir" && go mod download)
          done

      - name: Test ${{ matrix.module }}
        run: |
          cd ${{ matrix.module }} && go test ./... -v -count=1

  build-backend:
    needs: [test-backend]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - gateway
          - user-service
          - auth-service
          - vehicle-service
          - telemetry-service
          - dispatch-service
          - alarm-service
          - route-service
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: |
            gateway/go.sum
            services/*/go.sum

      - name: Build ${{ matrix.service }}
        run: |
          if [ "${{ matrix.service }}" = "gateway" ]; then
            cd gateway && CGO_ENABLED=0 go build -o /dev/null ./cmd
          else
            cd services/${{ matrix.service }} && CGO_ENABLED=0 go build -o /dev/null ./cmd
          fi

  lint-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: .

  test-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web-admin
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: web-admin/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  docker-build:
    needs: [test-backend, test-frontend]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - gateway
          - user-service
          - auth-service
          - vehicle-service
          - telemetry-service
          - dispatch-service
          - alarm-service
          - route-service
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile.service
          push: true
          tags: ghcr.io/${{ github.repository }}/${{ matrix.service }}:latest
          build-args: |
            SERVICE=${{ matrix.service }}

  docker-build-frontend:
    needs: [test-frontend]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push web-admin
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile.frontend
          push: true
          tags: ghcr.io/${{ github.repository }}/web-admin:latest
