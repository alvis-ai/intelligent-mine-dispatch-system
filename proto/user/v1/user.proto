syntax = "proto3";

package user.v1;

option go_package = "github.com/aicong/mine-dispatch/proto/user/v1;userv1";

message User {
  uint64 id = 1;
  string username = 2;
  string password = 11;
  string real_name = 3;
  string email = 4;
  string phone = 5;
  int32 role = 6;
  int32 status = 7;
  uint64 mine_id = 8;
  string created_at = 9;
  string updated_at = 10;
}

message CreateUserRequest {
  string username = 1;
  string password = 2;
  string real_name = 3;
  string email = 4;
  string phone = 5;
  uint64 mine_id = 6;
}

message GetUserRequest {
  uint64 id = 1;
}

message UpdateUserRequest {
  uint64 id = 1;
  string real_name = 2;
  string email = 3;
  string phone = 4;
  int32 role = 5;
  int32 status = 6;
}

message DeleteUserRequest {
  uint64 id = 1;
}

message ListUserRequest {
  int32 page = 1;
  int32 page_size = 2;
  string keyword = 3;
  uint64 mine_id = 4;
}

message UserResponse {
  int32 code = 1;
  string message = 2;
  User data = 3;
}

message UserListResponse {
  int32 code = 1;
  string message = 2;
  repeated User data = 3;
  int64 total = 4;
}

service UserService {
  rpc CreateUser(CreateUserRequest) returns (UserResponse);
  rpc GetUser(GetUserRequest) returns (UserResponse);
  rpc UpdateUser(UpdateUserRequest) returns (UserResponse);
  rpc DeleteUser(DeleteUserRequest) returns (UserResponse);
  rpc ListUser(ListUserRequest) returns (UserListResponse);
}
