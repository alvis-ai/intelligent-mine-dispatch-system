syntax = "proto3";

package route.v1;

option go_package = "github.com/aicong/mine-dispatch/proto/route/v1;routev1";

// ── Graph Models ──

message RoadNode {
  uint64 id = 1;
  string name = 2;
  double latitude = 3;
  double longitude = 4;
  uint64 mine_id = 5;
  string created_at = 6;
  string updated_at = 7;
}

message RoadEdge {
  uint64 id = 1;
  uint64 from_node_id = 2;
  uint64 to_node_id = 3;
  double distance_m = 4;
  int32 max_speed_kmh = 5;
  bool is_oneway = 6;
  uint64 mine_id = 7;
  string created_at = 8;
  string updated_at = 9;
}

message Point {
  double latitude = 1;
  double longitude = 2;
}

message RoutePath {
  repeated Point points = 1;
  repeated uint64 node_ids = 2;
  repeated uint64 edge_ids = 3;
  double total_distance_m = 4;
  double total_duration_s = 5;
  string polyline = 6;
}

// ── Requests / Responses ──

message CreateNodeRequest {
  string name = 1;
  double latitude = 2;
  double longitude = 3;
  uint64 mine_id = 4;
}

message UpdateNodeRequest {
  uint64 id = 1;
  string name = 2;
  double latitude = 3;
  double longitude = 4;
  uint64 mine_id = 5;
}

message GetNodeRequest { uint64 id = 1; }
message DeleteNodeRequest { uint64 id = 1; }
message ListNodeRequest { uint64 mine_id = 1; }

message NodeResponse { int32 code = 1; string message = 2; RoadNode data = 3; }
message NodeListResponse { int32 code = 1; string message = 2; repeated RoadNode data = 3; int64 total = 4; }

message CreateEdgeRequest {
  uint64 from_node_id = 1;
  uint64 to_node_id = 2;
  double distance_m = 3;
  int32 max_speed_kmh = 4;
  bool is_oneway = 5;
  uint64 mine_id = 6;
}

message UpdateEdgeRequest {
  uint64 id = 1;
  uint64 from_node_id = 2;
  uint64 to_node_id = 3;
  double distance_m = 4;
  int32 max_speed_kmh = 5;
  bool is_oneway = 6;
  uint64 mine_id = 7;
}

message GetEdgeRequest { uint64 id = 1; }
message DeleteEdgeRequest { uint64 id = 1; }
message ListEdgeRequest { uint64 mine_id = 1; uint64 node_id = 2; }

message EdgeResponse { int32 code = 1; string message = 2; RoadEdge data = 3; }
message EdgeListResponse { int32 code = 1; string message = 2; repeated RoadEdge data = 3; int64 total = 4; }

message CalculateRouteRequest {
  double from_lat = 1;
  double from_lon = 2;
  double to_lat = 3;
  double to_lon = 4;
  string algorithm = 5;       // "dijkstra" | "astar"
  uint64 mine_id = 6;
}

message RouteResponse {
  int32 code = 1;
  string message = 2;
  RoutePath data = 3;
}

message GetDistanceRequest {
  double from_lat = 1;
  double from_lon = 2;
  double to_lat = 3;
  double to_lon = 4;
  uint64 mine_id = 5;
}

message DistanceResponse {
  int32 code = 1;
  string message = 2;
  double distance_m = 3;
  double duration_s = 4;
}

message BatchRouteRequest {
  repeated RouteRequest requests = 1;
}

message RouteRequest {
  double from_lat = 1;
  double from_lon = 2;
  double to_lat = 3;
  double to_lon = 4;
  string algorithm = 5;
  uint64 mine_id = 6;
}

message BatchRouteResponse {
  int32 code = 1;
  string message = 2;
  repeated RouteResult results = 3;
}

message RouteResult {
  double distance_m = 1;
  double duration_s = 2;
  int32 status = 3;          // 0 = ok
  string error = 4;
}

service RouteService {
  // Node CRUD
  rpc CreateNode(CreateNodeRequest) returns (NodeResponse);
  rpc UpdateNode(UpdateNodeRequest) returns (NodeResponse);
  rpc GetNode(GetNodeRequest) returns (NodeResponse);
  rpc DeleteNode(DeleteNodeRequest) returns (NodeResponse);
  rpc ListNodes(ListNodeRequest) returns (NodeListResponse);

  // Edge CRUD
  rpc CreateEdge(CreateEdgeRequest) returns (EdgeResponse);
  rpc UpdateEdge(UpdateEdgeRequest) returns (EdgeResponse);
  rpc GetEdge(GetEdgeRequest) returns (EdgeResponse);
  rpc DeleteEdge(DeleteEdgeRequest) returns (EdgeResponse);
  rpc ListEdges(ListEdgeRequest) returns (EdgeListResponse);

  // Routing
  rpc CalculateRoute(CalculateRouteRequest) returns (RouteResponse);
  rpc GetDistance(GetDistanceRequest) returns (DistanceResponse);
  rpc BatchCalculate(BatchRouteRequest) returns (BatchRouteResponse);
}
